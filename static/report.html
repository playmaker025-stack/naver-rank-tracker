<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>순위 분석 보고서</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f4f6f9; color: #1a1a2e; font-size: 14px; line-height: 1.6; }

  .top-bar {
    background: #fff; border-bottom: 1px solid #e8e8e8;
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: none; border: 1px solid #ddd; border-radius: 8px;
    padding: 6px 14px; cursor: pointer; font-size: .82rem; color: #555;
    text-decoration: none;
  }
  .back-btn:hover { background: #f5f5f5; }
  .top-bar-title { font-size: 1rem; font-weight: 700; color: #1a1a2e; }
  .top-bar-sub { font-size: .8rem; color: #888; margin-left: auto; }

  .container { max-width: 900px; margin: 24px auto; padding: 0 20px 60px; }

  /* 헤더 카드 */
  .report-header {
    background: linear-gradient(135deg, #03c75a 0%, #02a84d 100%);
    border-radius: 16px; padding: 24px 28px; color: #fff; margin-bottom: 20px;
  }
  .report-header h1 { font-size: 1.25rem; font-weight: 800; margin-bottom: 6px; }
  .report-header .meta { font-size: .8rem; opacity: .85; display: flex; gap: 16px; flex-wrap: wrap; }
  .report-header .rank-badge {
    margin-top: 16px; display: inline-flex; align-items: baseline; gap: 10px;
  }
  .report-header .rank-num { font-size: 3rem; font-weight: 900; line-height: 1; }
  .report-header .rank-label { font-size: .9rem; opacity: .85; }
  .report-header .rank-change { font-size: 1rem; font-weight: 700; }

  /* 섹션 카드 */
  .card {
    background: #fff; border-radius: 14px; border: 1px solid #eee;
    padding: 20px 24px; margin-bottom: 16px;
  }
  .card-title {
    font-size: .88rem; font-weight: 800; color: #555;
    text-transform: uppercase; letter-spacing: .04em;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: ''; display: block; width: 4px; height: 16px;
    background: #03c75a; border-radius: 2px;
  }

  /* 지표 그리드 */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .metric-item { }
  .metric-label { font-size: .75rem; color: #888; margin-bottom: 3px; }
  .metric-value { font-size: 1.3rem; font-weight: 800; color: #1a1a2e; }
  .metric-value.good { color: #03c75a; }
  .metric-value.warn { color: #f59e0b; }
  .metric-value.bad  { color: #ef4444; }
  .metric-delta { font-size: .78rem; color: #aaa; margin-top: 1px; }
  .metric-delta.up   { color: #03c75a; }
  .metric-delta.down { color: #ef4444; }

  /* 가격 바 */
  .price-bar-wrap { margin: 14px 0 6px; position: relative; height: 8px; background: #f0f0f0; border-radius: 4px; }
  .price-bar-fill { height: 100%; background: #03c75a; border-radius: 4px; }
  .price-bar-marker {
    position: absolute; top: -4px; width: 16px; height: 16px;
    background: #fff; border: 3px solid #03c75a; border-radius: 50%;
    transform: translateX(-50%);
  }
  .price-bar-labels { display: flex; justify-content: space-between; font-size: .72rem; color: #aaa; }

  /* 키워드 체크 */
  .kw-check {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0; border-bottom: 1px solid #f5f5f5;
  }
  .kw-check:last-child { border-bottom: none; }
  .check-icon { font-size: 1.1rem; flex-shrink: 0; }
  .check-label { flex: 1; font-size: .85rem; }
  .check-detail { font-size: .78rem; color: #888; }
  .title-hl { background: #fff3cd; border-radius: 3px; padding: 0 2px; }

  /* 경쟁사 테이블 */
  .comp-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .comp-table th {
    background: #f8f9fa; padding: 8px 12px;
    text-align: left; font-size: .75rem; color: #888; font-weight: 600;
    border-bottom: 2px solid #eee;
  }
  .comp-table td { padding: 9px 12px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  .comp-table tr:last-child td { border-bottom: none; }
  .comp-table tr.is-ours { background: #f0fdf4; }
  .comp-table tr.is-new td:first-child::after {
    content: 'NEW'; font-size: .65rem; background: #fef3c7; color: #d97706;
    border-radius: 4px; padding: 1px 5px; margin-left: 6px; font-weight: 700; vertical-align: middle;
  }
  .rank-cell { font-weight: 700; color: #03c75a; font-size: .95rem; }
  .ours-badge {
    display: inline-block; font-size: .65rem; background: #d1fae5; color: #065f46;
    border-radius: 4px; padding: 1px 6px; font-weight: 700; vertical-align: middle; margin-left: 4px;
  }

  /* 차트 영역 */
  .chart-wrap { height: 160px; margin-top: 4px; }

  /* 신규 경쟁사 알림 */
  .alert-box {
    background: #fff7ed; border: 1px solid #fed7aa; border-radius: 10px;
    padding: 14px 18px; margin-bottom: 16px;
  }
  .alert-box-title { font-weight: 700; color: #c2410c; margin-bottom: 8px; font-size: .88rem; }
  .alert-box-item { font-size: .83rem; color: #7c2d12; padding: 4px 0; }

  /* 빈 상태 */
  .empty-section { color: #bbb; font-size: .83rem; text-align: center; padding: 20px 0; }

  /* 보고서 생성 시각 */
  .generated-at { text-align: right; font-size: .72rem; color: #ccc; margin-top: 8px; }

  .loading { text-align: center; padding: 80px 20px; color: #aaa; font-size: .9rem; }
</style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="back-btn">← 대시보드</a>
  <span class="top-bar-title" id="topBarTitle">순위 분석 보고서</span>
  <span class="top-bar-sub" id="topBarSub"></span>
</div>

<div class="container" id="reportRoot">
  <div class="loading">보고서 불러오는 중…</div>
</div>

<script>
const API = '/api';
const params = new URLSearchParams(location.search);
const productId = params.get('product_id');
const keyword   = params.get('keyword');

function fmt(n) { return n != null ? n.toLocaleString() : '—'; }
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function rankChangeLabel(curr, prev) {
  if (curr == null && prev == null) return '';
  if (curr == null) return `<span style="color:#ef4444">▼ 100위 밖 이탈</span>`;
  if (prev == null) return `<span style="color:#03c75a">▲ 재진입</span>`;
  const d = prev - curr;
  if (d > 0) return `<span style="color:#03c75a">▲ ${d}위 상승</span>`;
  if (d < 0) return `<span style="color:#ef4444">▼ ${Math.abs(d)}위 하락</span>`;
  return `<span style="color:#aaa">변동 없음</span>`;
}

function highlightKeyword(title, kw) {
  if (!title || !kw) return esc(title);
  const re = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(title).replace(re, '<span class="title-hl">$1</span>');
}

async function loadReport() {
  if (!productId || !keyword) {
    document.getElementById('reportRoot').innerHTML =
      '<div class="loading">URL 파라미터가 없습니다. (product_id, keyword 필요)</div>';
    return;
  }

  try {
    const res = await fetch(`${API}/reports/${productId}?keyword=${encodeURIComponent(keyword)}`);
    if (!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    renderReport(d);
  } catch (e) {
    document.getElementById('reportRoot').innerHTML =
      `<div class="loading">보고서 로드 실패: ${e.message}</div>`;
  }
}

function renderReport(d) {
  document.title = `보고서 — ${d.keyword} | ${d.product_name}`;
  document.getElementById('topBarTitle').textContent = `📊 ${d.keyword} 순위 분석`;
  document.getElementById('topBarSub').textContent = `${d.store_name} · ${d.product_name}`;

  const curr = d.rank.current;
  const prev = d.rank.prev;
  const rankDisplay = curr != null ? `${curr}위` : '100위 밖';
  const rankChange = rankChangeLabel(curr, prev);

  /* ─── 가격 섹션 ─── */
  const p = d.price;
  let priceSection = '';
  if (p.top20_avg != null) {
    const pct = p.ours && p.top20_avg
      ? Math.round((p.ours / p.top20_avg - 1) * 100)
      : null;
    const pctLabel = pct != null
      ? (pct > 0
          ? `<span class="metric-delta down">TOP20 평균 대비 +${pct}% 높음</span>`
          : pct < 0
          ? `<span class="metric-delta up">TOP20 평균 대비 ${pct}% 낮음</span>`
          : `<span class="metric-delta">TOP20 평균과 동일</span>`)
      : '';

    // 가격 포지션 바
    let barHtml = '';
    if (p.ours && p.top20_min && p.top20_max && p.top20_max > p.top20_min) {
      const pos = Math.min(100, Math.max(0, Math.round((p.ours - p.top20_min) / (p.top20_max - p.top20_min) * 100)));
      barHtml = `
        <div style="margin:16px 0 4px">
          <div class="price-bar-wrap">
            <div class="price-bar-fill" style="width:100%"></div>
            <div class="price-bar-marker" style="left:${pos}%"></div>
          </div>
          <div class="price-bar-labels">
            <span>최저 ${fmt(p.top20_min)}원</span>
            <span>▲ 우리 상품</span>
            <span>최고 ${fmt(p.top20_max)}원</span>
          </div>
        </div>`;
    }

    priceSection = `
      <div class="card">
        <div class="card-title">가격 경쟁력</div>
        <div class="metric-grid">
          <div class="metric-item">
            <div class="metric-label">우리 상품</div>
            <div class="metric-value">${p.ours ? fmt(p.ours)+'원' : '—'}</div>
            ${pctLabel}
          </div>
          <div class="metric-item">
            <div class="metric-label">TOP20 평균가</div>
            <div class="metric-value">${fmt(p.top20_avg)}원</div>
          </div>
          <div class="metric-item">
            <div class="metric-label">TOP20 최저가</div>
            <div class="metric-value">${fmt(p.top20_min)}원</div>
          </div>
          <div class="metric-item">
            <div class="metric-label">TOP20 최고가</div>
            <div class="metric-value">${fmt(p.top20_max)}원</div>
          </div>
        </div>
        ${barHtml}
      </div>`;
  } else {
    priceSection = `<div class="card"><div class="card-title">가격 경쟁력</div><div class="empty-section">경쟁사 데이터 없음 — 다음 수집 후 확인 가능</div></div>`;
  }

  /* ─── 키워드 최적화 섹션 ─── */
  const ko = d.keyword_optimization;
  const kwInTitle = ko.in_our_title;
  const titleHtml = highlightKeyword(ko.our_title, d.keyword);
  const kwSection = `
    <div class="card">
      <div class="card-title">키워드 최적화</div>
      <div class="kw-check">
        <span class="check-icon">${kwInTitle ? '✅' : '❌'}</span>
        <div>
          <div class="check-label">
            <b>"${esc(d.keyword)}"</b> ${kwInTitle ? '상품 제목에 포함됨' : '상품 제목에 없음'}
            ${!kwInTitle ? '<span style="color:#ef4444;font-size:.78rem"> — TOP10 중 포함 제품: '+ko.top10_with_keyword+'/'+ko.top10_total+'개</span>' : ''}
          </div>
          <div class="check-detail" style="margin-top:4px">우리 제목: ${titleHtml}</div>
        </div>
      </div>
      <div class="kw-check">
        <span class="check-icon">${ko.top10_with_keyword >= ko.top10_total * 0.7 ? '📌' : 'ℹ️'}</span>
        <div class="check-label">
          TOP10 상품 중 키워드 포함 비율: <b>${ko.top10_with_keyword}/${ko.top10_total}</b>
          ${ko.top10_with_keyword >= ko.top10_total * 0.7 ? ' — 대부분 포함 (경쟁 필수)' : ''}
        </div>
      </div>
    </div>`;

  /* ─── 페이지 메트릭 섹션 ─── */
  const pm = d.page_metrics;
  let metricsSection = '';
  if (pm.current) {
    const c = pm.current;
    const pv = pm.prev;
    function delta(curr, prev, unit = '') {
      if (curr == null) return '';
      if (prev == null || curr === prev) return `<div class="metric-delta">이전 데이터 없음</div>`;
      const d = curr - prev;
      const cls = d > 0 ? 'up' : 'down';
      const sign = d > 0 ? '+' : '';
      return `<div class="metric-delta ${cls}">${sign}${d}${unit} (직전 대비)</div>`;
    }
    metricsSection = `
      <div class="card">
        <div class="card-title">스마트스토어 지표</div>
        <div class="metric-grid">
          <div class="metric-item">
            <div class="metric-label">리뷰 수</div>
            <div class="metric-value">${c.review_count != null ? c.review_count.toLocaleString() : '—'}</div>
            ${delta(c.review_count, pv?.review_count, '개')}
          </div>
          <div class="metric-item">
            <div class="metric-label">평점</div>
            <div class="metric-value ${c.rating >= 4.5 ? 'good' : c.rating >= 4.0 ? '' : 'warn'}">${c.rating ?? '—'}</div>
            ${delta(c.rating, pv?.rating)}
          </div>
          <div class="metric-item">
            <div class="metric-label">찜 수</div>
            <div class="metric-value">${c.wishlist_count != null ? c.wishlist_count.toLocaleString() : '—'}</div>
            ${delta(c.wishlist_count, pv?.wishlist_count, '개')}
          </div>
          <div class="metric-item">
            <div class="metric-label">수집 시각</div>
            <div class="metric-value" style="font-size:.85rem">${fmtDate(c.collected_at)}</div>
          </div>
        </div>
      </div>`;
  } else {
    metricsSection = `
      <div class="card">
        <div class="card-title">스마트스토어 지표</div>
        <div class="empty-section">
          수집 데이터 없음 — 상품 URL이 smartstore.naver.com 형식인지 확인 후 다음 수집을 기다려주세요
        </div>
      </div>`;
  }

  /* ─── 신규 경쟁사 알림 ─── */
  let newCompSection = '';
  if (d.new_competitors.length > 0) {
    newCompSection = `
      <div class="alert-box">
        <div class="alert-box-title">⚠️ TOP10 신규 진입 경쟁사 ${d.new_competitors.length}개</div>
        ${d.new_competitors.map(c =>
          `<div class="alert-box-item">• ${esc(c.title)} (${esc(c.mall_name)}) — ${c.price ? fmt(c.price)+'원' : '가격미상'} · ${c.rank}위</div>`
        ).join('')}
      </div>`;
  }

  /* ─── TOP20 경쟁사 테이블 ─── */
  let compTableSection = '';
  if (d.competitors.length > 0) {
    const rows = d.competitors.map(c => `
      <tr class="${c.is_ours ? 'is-ours' : ''} ${c.is_new && !c.is_ours ? 'is-new' : ''}">
        <td class="rank-cell">${c.rank}</td>
        <td>${esc(c.title)}${c.is_ours ? '<span class="ours-badge">우리</span>' : ''}</td>
        <td style="color:#888">${esc(c.mall_name)}</td>
        <td style="text-align:right">${c.price ? fmt(c.price)+'원' : '—'}</td>
      </tr>`).join('');
    compTableSection = `
      <div class="card">
        <div class="card-title">TOP20 경쟁 현황</div>
        <div style="overflow-x:auto">
          <table class="comp-table">
            <thead><tr><th>#</th><th>상품명</th><th>판매처</th><th style="text-align:right">가격</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  } else {
    compTableSection = `<div class="card"><div class="card-title">TOP20 경쟁 현황</div><div class="empty-section">다음 수집 후 데이터가 쌓입니다</div></div>`;
  }

  /* ─── 최종 렌더 ─── */
  document.getElementById('reportRoot').innerHTML = `
    <div class="report-header">
      <h1>📊 "${esc(d.keyword)}" 순위 분석</h1>
      <div class="meta">
        <span>🏪 ${esc(d.store_name)}</span>
        <span>📦 ${esc(d.product_name)}</span>
        <span>🕐 ${fmtDate(d.generated_at)}</span>
      </div>
      <div class="rank-badge">
        <span class="rank-num">${rankDisplay}</span>
        <div>
          <div class="rank-label">현재 순위 ${prev != null ? `(직전: ${prev != null ? prev+'위' : '100위 밖'})` : ''}</div>
          <div class="rank-change">${rankChange}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">순위 추이</div>
      <div class="chart-wrap"><canvas id="rankChart"></canvas></div>
    </div>

    ${priceSection}
    ${kwSection}
    ${metricsSection}
    ${newCompSection}
    ${compTableSection}

    <div class="generated-at">보고서 생성: ${new Date(d.generated_at).toLocaleString('ko-KR')}</div>
  `;

  /* ─── 순위 차트 ─── */
  if (d.rank.history.length > 0) {
    const ctx = document.getElementById('rankChart');
    const labels = d.rank.history.map(h => fmtDate(h.collected_at));
    const ranks  = d.rank.history.map(h => h.rank);
    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: ranks,
          borderColor: '#03c75a',
          backgroundColor: 'rgba(3,199,90,.08)',
          pointBackgroundColor: '#03c75a',
          pointRadius: ranks.length > 20 ? 2 : 4,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            reverse: true, min: 1,
            ticks: { font: { size: 11 }, stepSize: 1 },
            title: { display: true, text: '순위 (낮을수록 좋음)', font: { size: 10 }, color: '#aaa' },
          },
          x: { ticks: { font: { size: 10 }, maxTicksLimit: 8 } }
        },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => c.raw != null ? `${c.raw}위` : '100위 밖' } }
        }
      }
    });
  }
}

loadReport();
</script>
</body>
</html>
